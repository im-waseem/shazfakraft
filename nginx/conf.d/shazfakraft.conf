# ──────────────────────────────────────────────────────────
# BEFORE SSL: run Certbot to issue a cert, then uncomment
# the HTTPS server block below.
#
# Certbot command (run on VPS, containers must be stopped):
#   certbot certonly --standalone -d shazfakraft.in -d www.shazfakraft.in
# ──────────────────────────────────────────────────────────

# ── HTTP: redirect all traffic to HTTPS ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name shazfakraft.in www.shazfakraft.in;

    # Certbot ACME challenge (keep this even after SSL is issued)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Docker healthcheck endpoint
    location /health {
        access_log  off;
        return 200 "ok\n";
        add_header  Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

