name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

      # Create app dir inside the user's home — no sudo needed
      - name: Create app directory
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'mkdir -p $HOME/shazfakraft/logs'

      - name: Sync source code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='logs' \
            --exclude='.env' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/shazfakraft/"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash $HOME/shazfakraft/scripts/deploy.sh'

      - name: Verify
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash $HOME/shazfakraft/scripts/healthcheck.sh'

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
