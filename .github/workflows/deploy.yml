name: Deploy to VPS

on:
  push:
    branches:
      - main

# Cancel any in-progress deploy when a newer push arrives
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Zero-downtime Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH setup ─────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

      # ── 3. Ensure app directory exists on VPS ────────────
      - name: Create app directory
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'mkdir -p /var/www/shazfakraft/logs'

      # ── 4. Sync source to VPS ────────────────────────────
      # rsync transfers only changed files (~1–3 s for small diffs).
      # .env is excluded — it lives permanently on the VPS.
      - name: Sync source code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='.active_slot' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/shazfakraft/"

      # ── 5. Deploy on VPS ─────────────────────────────────
      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash /var/www/shazfakraft/scripts/deploy.sh'

      # ── 6. Verify ─────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash /var/www/shazfakraft/scripts/healthcheck.sh'

      # ── 6. Clean up key from runner ───────────────────────
      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
